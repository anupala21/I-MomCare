<!DOCTYPE html>
<html>
<head>

<title>Admin Panel</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<h2 class="text-dark">
Admin Dashboard
</h2>

<div class="card p-4 mt-3">

<h4>Registered Users</h4>

<table class="table">

<thead>

<tr>
<th>ID</th>
<th>Name</th>
<th>Email</th>
<th>Role</th>
</tr>

</thead>

<tbody>

{% for user in users %}

<tr>

<td>{{ user.id }}</td>
<td>{{ user.name }}</td>
<td>{{ user.email }}</td>
<td>{{ user.role }}</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

</div>

</body>
</html>
