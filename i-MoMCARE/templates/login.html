<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login - i-MoMCARE</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    margin:0;
    padding:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0d6efd,#6f42c1);
    font-family:'Segoe UI',sans-serif;
}

.login-card{
    width:420px;
    background:white;
    padding:40px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.25);
}

.login-card h2{
    text-align:center;
    color:#0d6efd;
    font-weight:bold;
    margin-bottom:30px;
}

.form-control{
    border-radius:10px;
}

.btn-primary{
    border-radius:10px;
    padding:10px;
}

.register-link{
    text-align:center;
    margin-top:15px;
}

.register-link a{
    text-decoration:none;
}

</style>

</head>

<body>

<div class="login-card">

<h2>Login</h2>

<form method="POST">

<div class="mb-3">
<label>Email</label>
<input
type="email"
name="email"
class="form-control"
required>
</div>

<div class="mb-3">
<label>Password</label>
<input
type="password"
name="password"
class="form-control"
required>
</div>

<button
type="submit"
class="btn btn-primary w-100">
Login
</button>

<div class="register-link">
Don't have an account?
<a href="/register">Register</a>
</div>

</form>

</div>

</body>
</html>
