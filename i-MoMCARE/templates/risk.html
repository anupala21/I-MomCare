<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pre-Pregnancy Risk Assessment</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f4f7fc;
}

.card{
    border:none;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

h2{
    font-weight:bold;
}

</style>

</head>

<body>

<div class="container mt-5">

<h2 class="text-primary text-center mb-4">
Pre-Pregnancy Risk Assessment
</h2>

<div class="card p-4">

<form method="POST">

<div class="row">

<div class="col-md-6 mb-3">
<label>Age</label>
<input type="number" name="age" class="form-control" required>
</div>

<div class="col-md-6 mb-3">
<label>Height (cm)</label>
<input type="number" step="0.1" name="height" class="form-control" required>
</div>

<div class="col-md-6 mb-3">
<label>Weight (kg)</label>
<input type="number" step="0.1" name="weight" class="form-control" required>
</div>

<div class="col-md-6 mb-3">
<label>PCOS</label>
<select name="pcos" class="form-control">
<option>No</option>
<option>Yes</option>
</select>
</div>

<div class="col-md-6 mb-3">
<label>Thyroid</label>
<select name="thyroid" class="form-control">
<option>No</option>
<option>Yes</option>
</select>
</div>

<div class="col-md-6 mb-3">
<label>Diabetes</label>
<select name="diabetes" class="form-control">
<option>No</option>
<option>Yes</option>
</select>
</div>

<div class="col-md-6 mb-3">
<label>Blood Pressure</label>
<select name="bp" class="form-control">
<option>Normal</option>
<option>High</option>
</select>
</div>

<div class="col-md-6 mb-3">
<label>Hemoglobin (g/dL)</label>
<input type="number" step="0.1" name="hb" class="form-control" required>
</div>

<div class="col-md-6 mb-3">
<label>Smoking / Alcohol</label>
<select name="lifestyle" class="form-control">
<option>No</option>
<option>Yes</option>
</select>
</div>

<div class="col-md-6 mb-3">
<label>Previous Pregnancy Complications</label>
<select name="history" class="form-control">
<option>No</option>
<option>Yes</option>
</select>
</div>

<div class="col-md-6 mb-3">
<label>Menstrual Cycle</label>
<select name="cycle" class="form-control">
<option>Regular</option>
<option>Irregular</option>
</select>
</div>

</div>

<button type="submit" class="btn btn-primary w-100">
Check Risk
</button>

</form>

</div>

{% if result %}

<div class="alert alert-info mt-4">

<h4>{{ result }}</h4>

</div>

{% endif %}

</div>

</body>
</html>
